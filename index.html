<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#2d3a1e" />
    <meta name="description" content="TJ #freewilma – Varusmiespalveluksen laskuri" />
    <title>TJ #freewilma</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />

    <!-- canvas-confetti CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css?v=3" />
</head>

<body>
    <!-- Parchment texture overlay -->
    <div class="bg-texture"></div>

    <!-- Floating d20 dice (celebration) -->
    <div id="dice-rain" aria-hidden="true"></div>

    <!-- Emoji burst layer -->
    <div id="emoji-burst" aria-hidden="true"></div>

    <main>
        <!-- Header -->
        <header class="site-header">
            <h1 class="title">
                <span class="title-tj">TJ</span>
                <span class="title-tag">#freewilma</span>
            </h1>
            <p class="kotiutumis">Kotiutumispäivä: <strong>17.06.2027</strong></p>
        </header>

        <!-- Word of the Day (above counter) -->
        <section class="wotd-section" aria-label="Päivän sana">
            <div class="wotd-card">
                <p class="wotd-label">✦ PÄIVÄN SANA ✦</p>
                <p id="wotd-text" class="wotd-text">Ladataan...</p>
                <div class="reroll-row">
                    <button id="btn-reroll" class="btn-reroll" aria-label="Reroll word of the day" title="Reroll">
                        <span class="d20-icon" id="d20-icon">
                            <img src="d20.png" class="d20-svg" alt="d20 dice" aria-hidden="true" />
                        </span>
                        <span class="reroll-label">Reroll!</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Day Counter -->
        <section class="counter-section" aria-label="Päiviä jäljellä">
            <p class="counter-label">TÄNÄÄN JÄLJELLÄ</p>
            <div id="day-count" class="day-count" aria-live="polite">347</div>
        </section>

        <!-- Vapauteen button (shown when count = 0) -->
        <div id="vapauteen-wrap" class="vapauteen-wrap hidden">
            <button id="btn-vapauteen" class="btn-vapauteen" aria-label="Vapauteen!">
                ✊ Vapauteen! ✊
            </button>
        </div>
    </main>

    <!-- Audio elements -->
    <audio id="audio-freedom" src="freewilma.mp3" preload="none"></audio>
    <audio id="audio-dice" src="dice-roll.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>

</html>
